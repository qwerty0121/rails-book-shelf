services:
  app:
    build:
      context: .
      dockerfile: Dockerfile
    volumes:
      - ..:/workspaces/rails-book-shelf:cached
      - bundle_cache:/usr/local/bundle
      - claude_code_config:/home/vscode/.claude
      - gh_config:/home/vscode/.config/gh
      - type: volume
        source: claude_code_config
        target: /home/vscode/.claude.json
        volume:
          subpath: claude.json
    environment:
      - DATABASE_URL=postgres://postgres:password@db:5432
      - RAILS_ENV=development
      - CAPYBARA_SERVER_PORT=45678
      - SELENIUM_HOST=selenium
    depends_on:
      db:
        condition: service_started
      selenium:
        condition: service_healthy
    command: sleep infinity

  db:
    image: postgres:16
    restart: unless-stopped
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: password
      POSTGRES_DB: rails_book_shelf_development
    volumes:
      - postgres_data:/var/lib/postgresql/data

  selenium:
    image: selenium/standalone-chromium
    restart: unless-stopped
    shm_size: 2gb
    healthcheck:
      test: ["CMD", "curl", "-sf", "http://localhost:4444/status"]
      interval: 5s
      timeout: 5s
      retries: 10
      start_period: 10s

volumes:
  bundle_cache:
  postgres_data:
  claude_code_config:
  gh_config:
